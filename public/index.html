<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Citecheck</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; line-height: 1.5; }
      .card { border: 1px solid #ddd; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; }
      .confidence-high { color: #0a7f2e; font-weight: bold; }
      .confidence-medium { color: #b07d00; font-weight: bold; }
      .confidence-low { color: #b00020; font-weight: bold; }
      .citation-text { white-space: pre-wrap; background: #f7f7f7; padding: 0.75rem; border-radius: 6px; margin-top: 0.5rem; }
      .metadata-table { width: 100%; border-collapse: collapse; margin: 1rem 0; table-layout: fixed; }
      .metadata-table th, .metadata-table td { border: 1px solid #ddd; padding: 0.5rem; text-align: left; vertical-align: top; overflow-wrap: anywhere; }
      .metadata-table th { background: #f7f7f7; }
      .evidence-row { margin: 0.75rem 0; }
      .evidence-list { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.35rem; }
      .evidence-chip { display: inline-block; max-width: 100%; border: 1px solid #ddd; background: #f7f7f7; border-radius: 6px; padding: 0.2rem 0.45rem; font-size: 0.9rem; line-height: 1.3; overflow-wrap: anywhere; }
      button { padding: 0.6rem 1rem; cursor: pointer; }
      pre { white-space: pre-wrap; background: #f7f7f7; padding: 1rem; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>Citecheck</h1>
    <p>Upload a paper PDF to extract and review its references.</p>
    <p><strong>Engine:</strong> <span id="engine-version">loading…</span></p>
    <form id="upload-form">
      <label>
        <input id="debug-toggle" type="checkbox" />
        Enable parser debug traces
      </label>
      <br /><br />
      <input type="file" name="pdf" accept="application/pdf" required />
      <button type="submit">Analyze PDF</button>
    </form>
    <div id="debug-output" class="card" style="display:none;"></div>
    <div id="result"></div>

    <script>
      const form = document.getElementById('upload-form');
      const result = document.getElementById('result');
      const engineVersion = document.getElementById('engine-version');
      const debugToggle = document.getElementById('debug-toggle');
      const debugOutput = document.getElementById('debug-output');

      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;'
        }[char]));
      }

      function renderEvidence(evidence) {
        if (!Array.isArray(evidence) || evidence.length === 0) return '<p class="evidence-row"><strong>Evidence:</strong> None</p>';
        return `
          <div class="evidence-row">
            <strong>Evidence:</strong>
            <div class="evidence-list">
              ${evidence.map((item) => `<span class="evidence-chip">${escapeHtml(item)}</span>`).join('')}
            </div>
          </div>
        `;
      }

      function renderDoi(doi) {
        if (!doi) return 'None';
        const doiText = String(doi).replace(/^https?:\/\/(?:dx\.)?doi\.org\//i, '');
        const doiUrl = `https://doi.org/${doiText}`;
        return `<a href="${escapeHtml(doiUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(doiText)}</a>`;
      }

      function metadataValue(metadata, key) {
        return metadata && metadata[key] ? metadata[key] : 'Not found';
      }

      function renderMetadataComparison(metadata = {}) {
        const extracted = metadata.extracted || {};
        const matched = metadata.matched || {};
        const rows = [
          ['Authors', 'authors'],
          ['Date', 'date'],
          ['Title of work', 'title'],
          ['Publication venue', 'venue'],
          ['Volume', 'volume'],
          ['Issue', 'issue'],
          ['Pages', 'pages']
        ];

        return `
          <table class="metadata-table">
            <thead>
              <tr>
                <th>Field</th>
                <th>Extracted citation</th>
                <th>Found reference</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(([label, key]) => `
                <tr>
                  <th scope="row">${escapeHtml(label)}</th>
                  <td>${escapeHtml(metadataValue(extracted, key))}</td>
                  <td>${escapeHtml(metadataValue(matched, key))}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      }

      function renderProgress(message, detail = '') {
        result.innerHTML = `
          <div class="card">
            <h2>Analyzing PDF</h2>
            <p><strong>Status:</strong> ${escapeHtml(message)}</p>
            ${detail ? `<p>${escapeHtml(detail)}</p>` : ''}
          </div>
        `;
      }

      async function readAnalyzeResponse(response, onProgress) {
        const contentType = response.headers.get('content-type') || '';

        if (contentType.includes('application/json')) {
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Analysis failed');
          return data;
        }

        if (!response.ok) throw new Error('Analysis failed');
        if (!response.body) throw new Error('Streaming response is not available in this browser.');

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalResult = null;

        while (true) {
          const { value, done } = await reader.read();
          buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.trim()) continue;
            const message = JSON.parse(line);

            if (message.event === 'references-found') {
              onProgress('References extracted', `${message.total} references found.`);
            } else if (message.event === 'checking-reference') {
              onProgress(`Checking reference ${message.index} of ${message.total}`);
            } else if (message.event === 'checked-reference') {
              onProgress(`Checked reference ${message.index} of ${message.total}`, `Confidence: ${message.confidence || 'unknown'}${message.doi ? `; DOI: ${message.doi}` : ''}`);
            } else if (message.event === 'complete') {
              finalResult = message.result;
            } else if (message.event === 'error') {
              throw new Error(message.error || 'Analysis failed');
            }
          }

          if (done) break;
        }

        if (!finalResult) throw new Error('Analysis ended before returning results.');
        return finalResult;
      }

      async function loadEngineVersion() {
        try {
          const response = await fetch('/api/health');
          const data = await response.json();
          engineVersion.textContent = data.engineVersion || 'unknown';
        } catch (err) {
          engineVersion.textContent = 'unavailable';
        }
      }

      loadEngineVersion();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        renderProgress('Uploading PDF');

        try {
          const showDebugDetails = debugToggle.checked;
          if (showDebugDetails) {
            formData.set('debug', 'true');
            debugOutput.style.display = 'block';
            debugOutput.innerHTML = '<p>Waiting for parser trace...</p>';
          } else {
            formData.delete('debug');
            debugOutput.style.display = 'none';
            debugOutput.innerHTML = '';
          }

          const response = await fetch('/api/analyze', {
            method: 'POST',
            body: formData
          });
          const data = await readAnalyzeResponse(response, renderProgress);

          if (showDebugDetails && data.debugOutput) {
            debugOutput.innerHTML = `<pre>${escapeHtml(data.debugOutput)}</pre>`;
          }

          result.innerHTML = `
            <div class="card">
              <h2>Results for ${escapeHtml(data.filename)}</h2>
              <p><strong>References found:</strong> ${data.referencesFound}</p>
              <p><strong>Engine version:</strong> ${escapeHtml(data.engineVersion || 'unknown')}</p>
            </div>
            ${showDebugDetails ? `
              <div class="card">
                <h3>Extracted text</h3>
                <p><strong>Raw from Python:</strong></p>
                <pre>${escapeHtml(data.rawExtractedText || 'None')}</pre>
                <p><strong>Cleaned:</strong></p>
                <pre>${escapeHtml(data.cleanedExtractedText || 'None')}</pre>
                <p><strong>Processed for parsing:</strong></p>
                <pre>${escapeHtml(data.processedExtractedText || 'None')}</pre>
              </div>
            ` : ''}
            ${data.references.map((ref, index) => `
              <div class="card">
                <h3>${index + 1}</h3>
                <div class="citation-text">${escapeHtml(ref.reference)}</div>
                <p><strong>Type:</strong> ${escapeHtml(ref.type)}</p>
                <p><strong>DOI:</strong> ${renderDoi(ref.doi)}</p>
                ${renderMetadataComparison(ref.metadata)}
                <p class="confidence-${escapeHtml(ref.confidence)}"><strong>Confidence:</strong> ${escapeHtml(ref.confidence.toUpperCase())}</p>
                <p><strong>Summary:</strong> ${escapeHtml(ref.summary)}</p>
                ${renderEvidence(ref.evidence)}
                <p><strong>Recommendations:</strong> ${escapeHtml(ref.recommendations.join(' '))}</p>
              </div>
            `).join('')}
          `;
        } catch (err) {
          result.innerHTML = `<p style="color:red">${err.message}</p>`;
        }
      });
    </script>
  </body>
</html>
